<body>

    <section class="intro">
        <h1>D</h1>
        <h1>evFlix</h1>
    </section>

    <main>
        <section class="login">
            <form action="home/indexx.html" class="login-content">
                <h2>Login</h2>

                <label class="text-login">
                    <span>E-mail:</span>
                    <input type="email" placeholder="Digite seu e-mail">
                </label>

                <label class="text-login">
                    <span>Senha:</span>
                    <input type="password" placeholder="Digite sua senha">
                </label>

                <button type="submit">Entrar</button>

                <a href="register/index.html">Não têm conta? Cadastre-se</a>
            </form>
        </section>
    </main>
</body>
